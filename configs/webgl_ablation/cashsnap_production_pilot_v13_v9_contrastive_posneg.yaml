  label_policy:
  - Train from existing train-split/list-backed rows only; no new data root is introduced.
  - Human-countable partial positives are allowed; unreviewed corner_*.vis0p5 rows
    are blocked.
  - Hard-negative rows must be zero-label train-split rows.
  - Eval/failure-slice-mined rows are kept out of hard-negative training unless they
    are train-split analogs.
cashsnap_policy:
  intended_use: 'V13 production-pilot contrastive continuation: start from V9 and
    train on the V2/V9 base plus train-safe source-policy positives/negatives, USD2/KHR100
    out-of-schema money, foreign unknown-money, coin/nonbanknote, and partial-FP negatives
    to reduce unsafe target proposals while preserving countable visible-evidence
    positives.'
  promotion_rule: Compare to V9/V10/V11/V12 on full/strict/source clean, filtered
    partial val/test, held-out unknown money, true-empty, and split USD2/KHR100/foreign
    guardrails; kill if source-excluded clean drops below V9/V6 band or unknown-money
    safety fails to beat V9 without partial recall recovery.
